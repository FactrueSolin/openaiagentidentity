name: Build Ubuntu package

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ubuntu-package-${{ github.sha }}
  cancel-in-progress: false

jobs:
  package:
    name: Ubuntu 22.04 x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      CARGO_TERM_COLOR: always
      PACKAGE_NAME: agentidentity-web-linux-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: wasm32-unknown-unknown, x86_64-unknown-linux-musl
          components: clippy, rustfmt

      - name: Install musl linker
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --version 0.3.7 --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build release application
        env:
          LEPTOS_BIN_TARGET_TRIPLE: x86_64-unknown-linux-musl
        run: cargo leptos build --release

      - name: Assemble deployment package
        run: |
          set -eu
          binary=target/x86_64-unknown-linux-musl/release/agentidentity-web
          test -x "${binary}"
          test -d target/site/pkg
          test -d target/site/fonts
          find target/site/pkg -maxdepth 1 -type f -name '*.js' | grep -q .
          find target/site/pkg -maxdepth 1 -type f -name '*.wasm' | grep -q .

          readelf --program-headers "${binary}" > binary-program-headers.txt
          readelf --dynamic "${binary}" > binary-dynamic.txt
          if grep -q 'Requesting program interpreter' binary-program-headers.txt || \
             grep -q '(NEEDED)' binary-dynamic.txt; then
            echo 'Expected a statically linked server binary' >&2
            exit 1
          fi

          package_root="dist/${PACKAGE_NAME}"
          install -Dm755 "${binary}" "${package_root}/agentidentity-web"
          install -Dm644 .env.example "${package_root}/.env.example"
          mkdir -p "${package_root}/target"
          cp -a target/site "${package_root}/target/site"

          tar -C dist -czf "dist/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"
          cd dist
          sha256sum "${PACKAGE_NAME}.tar.gz" > "${PACKAGE_NAME}.tar.gz.sha256"

      - name: Smoke test packaged application
        run: |
          set -eu
          smoke_root="$(mktemp -d)"
          tar -C "${smoke_root}" -xzf "dist/${PACKAGE_NAME}.tar.gz"
          cd "${smoke_root}/${PACKAGE_NAME}"
          cp .env.example .env

          HOST=127.0.0.1 PORT=3100 PROXY_URL= ./agentidentity-web >server.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT

          attempt=0
          until curl --fail --silent --show-error --noproxy '*' http://127.0.0.1:3100/ >/dev/null; do
            attempt=$((attempt + 1))
            if [ "${attempt}" -ge 30 ]; then
              cat server.log
              exit 1
            fi
            sleep 1
          done

          kill "${server_pid}"
          wait "${server_pid}" || true
          trap - EXIT

      - name: Upload Ubuntu package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ github.sha }}
          path: |
            dist/${{ env.PACKAGE_NAME }}.tar.gz
            dist/${{ env.PACKAGE_NAME }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
